<div>
    <input type="text" 
        name="busca" 
        value="{{ busca }}"
        placeholder="Buscar..."
        hx-get="/lista"
        hx-trigger="input changed delay:500ms"
        hx-target="#lista"
        hx-select="#lista"
        hx-indicator="#indicator">

    <img id="indicator" class="htmx-indicator" src="/Static/spinner.svg" alt="Carregando..."/>
</div>

<div id="lista">
    <ul>
        {% for aluno in alunos %}
            <li>{{ aluno.id }} - {{ aluno.nome }}</li>
        {% else %}
            <li>Não há alunos</li>
        {% endfor %}
    </ul>

    <div class="paginacao">
        <button hx-get="/lista?busca={{ busca }}&pagina={{ pagina - 1 }}"
                hx-target="#lista"
                hx-select="#lista"
                hx-swap="outerHTML"
                {% if pagina <= 1 %} disabled {% endif %}>
            Anterior
        </button>

        <span>Página {{ pagina }}</span>

        <button hx-get="/lista?busca={{ busca }}&pagina={{ pagina + 1 }}"
                hx-target="#lista"
                hx-select="#lista"
                hx-swap="outerHTML"
                {% if not tem_proximo %} disabled {% endif %}>
            Próximo
        </button>
    </div>
</div>
