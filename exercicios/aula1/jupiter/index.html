<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JupiterWeb</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="usp-logo-transp.png" alt="Logo USP">
        <h1>JupiterWeb</h1>
    </header>

    <main>
        <div class="login-box">
            <form>
                <div class="campo">
                    <label>Usuário:</label>
                    <input type="text" name="user" required>
                </div>
                
                <div class="campo">
                    <label>Senha:</label>
                    <input type="password" name="pass" required>
                </div>

                <input type="submit" value="Entrar" class="botao">
            </form>

            <div class="links">
                <a href="https://uspdigital.usp.br/jupiterweb/esqueciSenha">Esqueci a senha</a>
                <a href="https://uspdigital.usp.br/jupiterweb/primeiroAcesso">Primeiro acesso</a>
            </div>
        </div>
    </main>

    <footer>
        <p>© 1999 - 2026 Superintendência de Tecnologia da Informação/USP</p>
    </footer>

</body>
</html>
